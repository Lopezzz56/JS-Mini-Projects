<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title>Course Form Project</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"> 
        <style>
            *{
                font-family: 'Times New Roman', Times, serif;
            }
            .bodydiv{
                background-color: whitesmoke;
                align-items: center;
                justify-content: center;
                display: flex;
                height: 100vh;

                gap: 10px;
            }
            .container-lg{
                background-color: aliceblue;
                padding: 12px 12px;
                border-radius: 10px;
                width: 100%;
                max-width: 600px;
            }
            .title{
                display: flex;
                /* align-items: center; */
                justify-content: center;
                flex-direction: row;
            }
        </style>
    </head>
    <body>
        <div class="bodydiv">
            <form class="container-lg form"> 
               <div class="title"> <h3>Course Form</h3></div>
                <div class="form-group mb-3">
                <label for="courseName">Course Name</label>
                <input name="courseName" type="text" class="form-control" id="courseName" placeholder="Enter course name" required>
            </div>
            <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel"  name="phone" class="form-control" id="phone" 
                    pattern="[0-9]{10}" placeholder="1234567890" required>
            <div class="invalid-feedback">
                Please enter a valid 10-digit phone number.
            </div>
            </div>

            <div class="mb-3">
            <label for="userEmail" class="form-label">Email address</label>
            <input type="email" name="userEmail"  class="form-control" id="userEmail" placeholder="name@example.com" required>
            <div class="invalid-feedback">
                Please enter a valid email address.
            </div>
            </div>
            
            <select name="courseLevel" class="form-select">
                <option value="" selected disabled>Open this select menu</option>
                <option value="JavaScript Basics">JavaScript Basics</option>
                <option value="Bootstrap Masterclass">Bootstrap Masterclass</option>
            </select>
            

            <button type="submit" class="btn btn-primary w-100">Add Course</button>


            </div>
        </form>
                    <div id="courseDisplay" class="mt-4 container-lg">
                <h4>Enrolled Courses</h4>
                <ul id="courseList" class="list-group">
                </ul>
            </div>
        <script src="app.js"></script>
    </body>
</html>
