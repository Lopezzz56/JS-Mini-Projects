    ul {
    list-style: none; /* Removes the dots */

}

/* Makes products sit in a row/grid instead of a single column */
.products-list, .carts-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}
