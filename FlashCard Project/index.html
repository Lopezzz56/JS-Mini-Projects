<!DOCTYPE html>
<html>
    <head>
        <meta  charset="utf-8">
        <meta name="viewport" content=" width=device-width initial-scale=1.0">
        <title>FlashCard Project</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"> 
      <style>
            *{
            /* background-color: aliceblue; */
            font-family: 'Times New Roman', Times, serif;
            padding: 0;
                }

                .bodydiv{
                    display: flex;
                    padding: 15px; 
                        justify-content: center; 
    /* align-items: center;      */
    min-height: 100vh;   

                }
                
                .modal.container-md {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 20;
                
                /* Layout inside the modal */
                display: flex; 
                flex-direction: column;
                height: 90%;
                max-height: fit-content;
                background-color: whitesmoke;
                padding: 30px; /* Increased padding for better look */
                width: 90%;    /* Better for mobile */
                max-width: 500px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            }
                .form-group {
                    width: 100%;           
                    margin-bottom: 15px;    
                }
                .title{
                display: flex;
                /* align-items: center; */
                justify-content: center;
                flex-direction: row;
            }
            .addcard{
                position: fixed;
                bottom: 20px; 
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 12px;
                background-color: aqua;
                border: none;
                border-radius: 12px;
            }
            .hidden{
                display: none !important;
            }
            .overlay{
                position: fixed;
                left: 0;
                right: 0;
                top: 0;
                bottom: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0,0,0,0.5);
                backdrop-filter: blur(3px);
                z-index: 1;
            }
            .cardsDisplay{
                padding: 20px 20px;
                margin: auto;
            }        
            .close{
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            border-radius: 20px;
            border-width: 1px;
            border-color: gray;
        }
      </style>  
    </head>
    <body>
        <div class="cardsDisplay" >
        <h4>Your Flashcards</h4>
        <ul class="cardsList row list-unstyled">
            </ul>
        </div>
        <div class="bodydiv">

            <div class=" overlay hidden"></div>
            <button class="addcard">Add FlashCard</button>
            <div class=" modal container-md hidden">
                <form class="form ">
                <div class="title"> <h2>Add a FlashCard</h2></div>
                <button type="button" class="close" >X</button>
                <div class="form-group mb-3">
                    <label for="question">Question</label>
                    <input type="text" name="question" class="form-control" placeholder="Enter Question" required >
                </div>
                <div class="form-group mb-3">
                    <label for="answer">Answer</label>
                    <input type="text" name="answer" class="form-control" placeholder="Enter Answer" required >
                </div>
                <button type="submit" class="btn btn-primary w-100">Add Course</button>
                </form>
            </div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
